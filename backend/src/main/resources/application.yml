spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

  # ── PostgreSQL ──────────────────────────────────────────
  datasource:
    url: ${POSTGRES_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/budgetsetu}}
    username: ${POSTGRES_USER:}
    password: ${POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  # ── MongoDB ─────────────────────────────────────────────
  mongodb:
    uri: ${spring.data.mongodb.uri:${MONGODB_URI:mongodb://localhost:27017/budgetsetu_docs}}

  # ── Redis ───────────────────────────────────────────────
  redis:
    url: ${spring.data.redis.url:${REDIS_URL:redis://localhost:6379}}

  # ── Flyway ──────────────────────────────────────────────
  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-on-validation-error: true
    locations: classpath:db/migration

  # ── File Upload ─────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB


# ── Server ──────────────────────────────────────────────
server:
  address: 0.0.0.0
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# ── App Config ──────────────────────────────────────────
app:
  frontend-url: ${FRONTEND_URL}
  admin:
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}
  email-verification:
    required: ${EMAIL_VERIFICATION_REQUIRED}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS}

  resend:
    api-key: ${RESEND_API_KEY:}
    from-email: ${RESEND_FROM_EMAIL:${MAIL_FROM_EMAIL:onboarding@resend.dev}}

  statement:
    storage-prefix: statements/
