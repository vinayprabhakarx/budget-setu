spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

  # ── PostgreSQL ──────────────────────────────────────────
  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  # ── MongoDB ─────────────────────────────────────────────
  mongodb:
    uri: ${MONGODB_URI}
    database: ${MONGODB_DATABASE}

  # ── Redis ───────────────────────────────────────────────
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    username: ${REDIS_USERNAME}
    password: ${REDIS_PASSWORD}


  # ── Flyway ──────────────────────────────────────────────
  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-on-validation-error: true
    locations: classpath:db/migration

  # ── File Upload ─────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

  # ── Mailgun SMTP ────────────────────────────────────────
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# ── Server ──────────────────────────────────────────────
server:
  address: 0.0.0.0
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# ── App Config ──────────────────────────────────────────
app:
  frontend-url: ${FRONTEND_URL}
  admin:
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}
  email-verification:
    required: ${EMAIL_VERIFICATION_REQUIRED}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS}



  mailgun:
    api-key: ${MAILGUN_API_KEY}
    sending-key: ${MAILGUN_SENDING_KEY}
    domain: ${MAILGUN_DOMAIN}
    from-email: ${MAIL_FROM_EMAIL}

  statement:
    storage-prefix: statements/
