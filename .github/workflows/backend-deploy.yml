name: Backend Deploy

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
      - 'docker-compose.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/budgetsetu-backend

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Application

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (skip tests)
        working-directory: ./backend
        run: ./mvnw clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/backend-*.jar
          retention-days: 5

  docker-build:
    needs: build
    runs-on: ubuntu-latest
    name: Build & Push Docker Image
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    needs: docker-build
    runs-on: ubuntu-latest
    name: Security Scan
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'backend'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-staging:
    needs: docker-build
    runs-on: ubuntu-latest
    name: Deploy to Staging
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          echo "Staging deployment placeholder"

  deploy-oracle-production:
    needs: docker-build
    runs-on: ubuntu-latest
    name: Deploy to Oracle Cloud (Production)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Oracle Cloud Instance
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ubuntu
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          DOCKER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          REGISTRY_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Save the private key to a file
          echo "$ORACLE_SSH_KEY" > private_key
          chmod 600 private_key
          
          # Execute deployment commands directly on the server
          ssh -i private_key -o StrictHostKeyChecking=no "$ORACLE_USER@$ORACLE_HOST" "
            echo '$REGISTRY_PASSWORD' | docker login -u '$REGISTRY_USERNAME' --password-stdin
            docker pull $DOCKER_IMAGE
            docker stop budgetsetu-backend || true
            docker rm budgetsetu-backend || true
            docker run -d --name budgetsetu-backend --restart unless-stopped -p 8080:8080 --env-file /home/ubuntu/.env.production -v /var/log/budgetsetu:/app/logs -u vinay $DOCKER_IMAGE
          "
          
          # Clean up local key
          rm private_key

  notify:
    needs: [build, docker-build, security-scan]
    runs-on: ubuntu-latest
    name: Notify Status
    if: always()

    steps:
      - name: Determine status
        run: |
          if [ "${{ needs.build.result }}" == "failure" ] || [ "${{ needs.docker-build.result }}" == "failure" ]; then
            echo "Pipeline failed!"
            exit 1
          fi
          echo "Pipeline completed successfully!"
