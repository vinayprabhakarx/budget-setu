name: Backend Deploy

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "backend/**"

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/budgetsetu-backend

jobs:
  docker-build:
    runs-on: ubuntu-latest
    name: Build & Push Docker Image
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    needs: docker-build
    runs-on: ubuntu-latest
    name: Security Scan
    if: github.event_name == 'push'
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: "sarif"
          output: "trivy-results.sarif"
        env:
          TRIVY_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          TRIVY_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  deploy-staging:
    needs: docker-build
    runs-on: ubuntu-latest
    name: Deploy to Staging
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          echo "Staging deployment placeholder"

  deploy-oracle-production:
    needs: docker-build
    runs-on: ubuntu-latest
    name: Deploy to Oracle Cloud (Production)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to Oracle Cloud Instance
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ubuntu
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          DOCKER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          REGISTRY_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Save the private key to a file
          echo "$ORACLE_SSH_KEY" > private_key
          chmod 600 private_key

          # Write the Docker Hub password to a temp file (avoids bash history leak)
          echo "$REGISTRY_PASSWORD" > docker_token.txt

          # Copy the token file to the server securely
          scp -i private_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 docker_token.txt "$ORACLE_USER@$ORACLE_HOST:/tmp/docker_token.txt"

          # Execute deployment commands on the server
          ssh -i private_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o ServerAliveInterval=15 "$ORACLE_USER@$ORACLE_HOST" << DEPLOY_EOF
            set -e
            
            # Login to Docker Hub securely (token from file, not command line)
            cat /tmp/docker_token.txt | docker login -u "$REGISTRY_USERNAME" --password-stdin
            rm -f /tmp/docker_token.txt
            
            # Pull the latest image
            docker pull $DOCKER_IMAGE
            
            # Stop and remove the old container
            docker stop budgetsetu-backend || true
            docker rm budgetsetu-backend || true
            
            # Start the new container
            docker run -d \
              --name budgetsetu-backend \
              --restart unless-stopped \
              -p 8080:8080 \
              --env-file /home/ubuntu/.env.production \
              -v /var/log/budgetsetu:/app/logs \
              $DOCKER_IMAGE
            
            # Cleanup old unused images to save disk space
            docker image prune -f
          DEPLOY_EOF

          # Clean up local files
          rm -f private_key docker_token.txt

      - name: Verify deployment health
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ubuntu
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
        run: |
          echo "$ORACLE_SSH_KEY" > private_key
          chmod 600 private_key

          echo "Waiting 20s for application to start..."
          sleep 20

          # Check if the container is running and healthy
          ssh -i private_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 "$ORACLE_USER@$ORACLE_HOST" << 'HEALTH_EOF'
            set -e
            
            # Check container status
            CONTAINER_STATUS=$(docker inspect --format='{{.State.Status}}' budgetsetu-backend 2>/dev/null || echo "not_found")
            echo "Container status: $CONTAINER_STATUS"
            
            if [ "$CONTAINER_STATUS" != "running" ]; then
              echo "ERROR: Container is not running!"
              docker logs --tail 50 budgetsetu-backend 2>&1 || true
              exit 1
            fi
            
            # Check health endpoint
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/health || echo "000")
            echo "Health endpoint returned: $HTTP_STATUS"
            
            if [ "$HTTP_STATUS" != "200" ]; then
              echo "WARNING: Health check returned non-200. Container logs:"
              docker logs --tail 30 budgetsetu-backend 2>&1 || true
            else
              echo "Deployment verified successfully!"
            fi
          HEALTH_EOF

          rm -f private_key

  notify:
    needs: [docker-build, security-scan]
    runs-on: ubuntu-latest
    name: Notify Status
    if: always()

    steps:
      - name: Determine status
        run: |
          if [ "${{ needs.docker-build.result }}" == "failure" ]; then
            echo "Pipeline failed!"
            exit 1
          fi
          echo "Pipeline completed successfully!"
