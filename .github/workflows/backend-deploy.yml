name: Backend Deploy

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "backend/**"

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/budget-setu

jobs:
  docker-build:
    runs-on: ubuntu-latest
    name: Build & Push Docker Image
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-oracle-production:
    needs: docker-build
    runs-on: ubuntu-latest
    name: Deploy to Oracle Cloud (Production)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to Oracle Cloud Instance
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ubuntu
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          DOCKER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          REGISTRY_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          REGISTRY_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -e
          # Save the private key to a file
          echo "$ORACLE_SSH_KEY" > private_key
          chmod 600 private_key

          # 1. Securely log in to Docker Hub over SSH without saving credentials to disk
          echo "Logging into private Docker Hub registry on remote server..."
          echo "$REGISTRY_TOKEN" | ssh -i private_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=60 "$ORACLE_USER@$ORACLE_HOST" "docker login -u '$REGISTRY_USERNAME' --password-stdin"

          # 2. Execute deployment logic on remote server
          ssh -i private_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=60 "$ORACLE_USER@$ORACLE_HOST" "DOCKER_IMAGE='$DOCKER_IMAGE' bash -s" << 'DEPLOY_EOF'
            set -e
            echo "--- Starting BudgetSetu Deployment on Oracle Cloud ---"
            
            # Validate required environment secrets file
            if [ ! -f /home/ubuntu/budget-setu/.env.production ]; then
              echo "❌ ERROR: /home/ubuntu/budget-setu/.env.production is missing on server! Cannot launch container securely."
              exit 1
            fi

            
            # Configure Docker daemon for 1GB RAM Oracle Free Tier
            if [ ! -f /etc/docker/daemon.json ] || ! grep -q "max-concurrent-downloads" /etc/docker/daemon.json 2>/dev/null; then
              sudo mkdir -p /etc/docker
              echo '{"max-concurrent-downloads": 1, "max-concurrent-uploads": 1}' | sudo tee /etc/docker/daemon.json > /dev/null
              sudo systemctl reload docker || sudo systemctl restart docker
            fi
            
            # Pull latest image
            echo "Pulling latest image..."
            docker pull -q "$DOCKER_IMAGE"
            
            # If an existing container with the same name exists, stop and remove it first
            if docker ps -a --filter "name=budget-setu" --format "{{.ID}}" | grep -q .; then
              echo "Found existing container 'budget-setu' — stopping and removing..."
              docker rm -f budget-setu || true
            fi

            # Start new container
            echo "Starting new container..."
            docker run -d \
              --name budget-setu \
              --restart unless-stopped \
              -p 8080:8080 \
              --env-file /home/ubuntu/budget-setu/.env.production \
              -v /home/ubuntu/budget-setu/logs:/app/logs \
              "$DOCKER_IMAGE"
            
            # Cleanup old unused images
            docker image prune -f
          DEPLOY_EOF

          # Clean up local sensitive files
          rm -f private_key

      - name: Verify deployment health
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ubuntu
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
        run: |
          echo "$ORACLE_SSH_KEY" > private_key
          chmod 600 private_key

          echo "--- Checking Live Health Endpoint with Retry Loop ---"
          ssh -i private_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=60 "$ORACLE_USER@$ORACLE_HOST" << 'HEALTH_EOF'
            set -e
            for i in {1..30}; do
              if curl -s -f http://localhost:8080/api/health > /dev/null; then
                echo "✅ Health check passed on attempt $i!"
                curl -i http://localhost:8080/api/health
                break
              fi
              echo "Attempt $i failed (application starting up...), retrying in 3 seconds..."
              sleep 3
              if [ $i -eq 30 ]; then
                echo "❌ Health check failed after 30 attempts! Showing container logs:"
                docker logs --tail 50 budget-setu 2>&1 || true
                exit 1
              fi
            done
          HEALTH_EOF

          rm -f private_key

  notify:
    needs: [docker-build]
    runs-on: ubuntu-latest
    name: Notify Status
    if: always()

    steps:
      - name: Determine status
        run: |
          if [ "${{ needs.docker-build.result }}" == "failure" ]; then
            echo "Pipeline failed!"
            exit 1
          fi
          echo "Pipeline completed successfully!"
